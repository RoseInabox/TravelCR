<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil</title>
</head>
<body>

<header th:replace="~{fragments/fragmentos :: header}"></header>

<h1>Mi Perfil</h1>

<p th:if="${param.exito}" style="color:green;">
    Perfil actualizado correctamente
</p>

<form th:action="@{/perfil}" th:object="${usuario}" method="post">

    <label>Nombre completo:</label>
    <input type="text" th:field="*{nombreCompleto}" required>

    <label>Correo:</label>
    <input type="email" th:field="*{correo}" readonly>

    <label>Fecha de nacimiento:</label>
    <input type="date" th:field="*{fechaNacimiento}">

    <button type="submit">Guardar cambios</button>

</form>

<footer th:replace="~{fragments/fragmentos :: footer}"></footer>

</body>
</html>
