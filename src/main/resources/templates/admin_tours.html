<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Administrar Tours</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f7fb;
            margin:0;
        }

        .container{
            max-width:1100px;
            margin:40px auto;
            padding:20px;
        }

        h1, h2{
            text-align:center;
            margin-bottom:20px;
        }

        .form-card, table{
            background:white;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
            padding:25px;
            margin-bottom:30px;
        }

        .form-grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:15px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
        }

        input, textarea, select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        textarea{
            resize:none;
            height:90px;
        }

        button, .btn{
            padding:10px 14px;
            border:none;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            cursor:pointer;
            display:inline-block;
        }

        .btn-guardar{
            background:#2563eb;
            color:white;
            margin-top:15px;
        }

        .btn-editar{
            background:#16a34a;
            color:white;
        }

        .btn-eliminar{
            background:#dc2626;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            padding:0;
            overflow:hidden;
        }

        th, td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #e5e7eb;
        }

        th{
            background:#0f172a;
            color:white;
        }

        tr:nth-child(even){
            background:#f1f5f9;
        }
    </style>
</head>

<body>

<header th:replace="~{fragments/fragmentos :: header}"></header>

<div class="container">

    <h1>Administrar Tours</h1>

    <div class="form-card">
        <h2 th:text="${tour.idTour == null ? 'Crear Tour' : 'Editar Tour'}"></h2>

        <form th:action="@{/admin/tours/guardar}" th:object="${tour}" method="post">

            <input type="hidden" th:field="*{idTour}">

            <div class="form-grid">

                <div>
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombre}" required>
                </div>

                <div>
                    <label>Precio</label>
                    <input type="number" step="0.01" th:field="*{precio}" required>
                </div>

                <div>
                    <label>Fecha</label>
                    <input type="date" th:field="*{fecha}" required>
                </div>

                <div>
                    <label>Destino</label>
                    <select th:field="*{destino}" required>
                        <option value="">Seleccione</option>
                        <option th:each="destino : ${destinos}"
                                th:value="${destino.idDestino}"
                                th:text="${destino.nombre}">
                        </option>
                    </select>
                </div>

            </div>

            <div style="margin-top:15px;">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" required></textarea>
            </div>

            <button type="submit" class="btn-guardar">Guardar</button>

        </form>
    </div>

    <table th:if="${tours != null and !tours.isEmpty()}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Destino</th>
                <th>Fecha</th>
                <th>Precio</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="t : ${tours}">
                <td th:text="${t.idTour}"></td>
                <td th:text="${t.nombre}"></td>
                <td th:text="${t.destino.nombre}"></td>
                <td th:text="${t.fecha}"></td>
                <td>₡<span th:text="${t.precio}"></span></td>
                <td>
                    <a th:href="@{/admin/tours/editar/{id}(id=${t.idTour})}"
                       class="btn btn-editar">
                        Editar
                    </a>

                    <form th:action="@{/admin/tours/eliminar/{id}(id=${t.idTour})}"
                          method="post"
                          style="display:inline;"
                          onsubmit="return confirm('¿Seguro que deseas eliminar este tour?');">

                        <button type="submit" class="btn btn-eliminar">
                            Eliminar
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</div>

<footer th:replace="~{fragments/fragmentos :: footer}"></footer>

</body>
</html>
