<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Login</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f6f9;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            form {
                background: white;
                padding: 25px;
                border-radius: 10px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.1);
                width: 300px;
            }

            h1 {
                text-align: center;
                margin-bottom: 20px;
            }

            div {
                margin-bottom: 15px;
            }

            label {
                display: block;
                margin-bottom: 5px;
                font-weight: bold;
            }

            input {
                width: 100%;
                padding: 8px;
                border-radius: 5px;
                border: 1px solid #ccc;
            }

            button {
                width: 100%;
                padding: 10px;
                background-color: #007BFF;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
            }

            button:hover {
                background-color: #0056b3;
            }

            p {
                text-align: center;
                margin-top: 10px;
            }

            a {
                display: block;
                text-align: center;
                margin-top: 10px;
                color: #007BFF;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>

    </head>

    <body>

        <form th:action="@{/login}" method="post">

            <h1>Iniciar sesión</h1>

            <div>
                <label>Correo:</label>
                <input type="text" name="username" required>
            </div>

            <div>
                <label>Contraseña:</label>
                <input type="password" name="password" required>
            </div>

            <button type="submit">Entrar</button>

            <p th:if="${param.error}" style="color:red;">Credenciales incorrectas</p>
            <p th:if="${param.logout}" style="color:green;">Sesión cerrada</p>

            <a th:href="@{/registro}">Ir a registro</a>

        </form>
    </body>
</html>
