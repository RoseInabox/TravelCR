<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Reserva</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f7fb;
            margin:0;
        }

        .container{
            max-width:800px;
            margin:40px auto;
            padding:20px;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }

        .item{
            margin-bottom:15px;
            font-size:16px;
        }

        .label{
            font-weight:bold;
            color:#0f172a;
        }

        .badge{
            padding:6px 10px;
            border-radius:8px;
            font-size:12px;
            font-weight:bold;
        }

        .pendiente{ background:#facc15; }
        .aprobado{ background:#22c55e; color:white; }
        .rechazado{ background:#ef4444; color:white; }

        .acciones{
            margin-top:25px;
            text-align:center;
        }

        .btn{
            padding:10px 15px;
            border-radius:8px;
            text-decoration:none;
            font-weight:bold;
            margin:5px;
            display:inline-block;
        }

        .btn-volver{
            background:#64748b;
            color:white;
        }
    </style>
</head>

<body>

<header th:replace="~{fragments/fragmentos :: header}"></header>

<div class="container">

    <h1>Detalle de Reserva</h1>

    <div class="card">

        <div class="item">
            <span class="label">ID:</span>
            <span th:text="${reserva.idReserva}"></span>
        </div>

        <div class="item">
            <span class="label">Tour:</span>
            <span th:text="${reserva.tour.nombre}"></span>
        </div>

        <div class="item">
            <span class="label">Cantidad de Personas:</span>
            <span th:text="${reserva.cantidadPersonas}"></span>
        </div>

        <div class="item">
            <span class="label">Fecha:</span>
            <span th:text="${#temporals.format(reserva.fechaReserva, 'dd/MM/yyyy')}"></span>
        </div>

        <div class="item">
            <span class="label">Estado de la Reserva:</span>
            <span th:text="${reserva.estado}"
                  th:class="'badge ' + 
                  (reserva.estado == 'PENDIENTE' ? 'pendiente' :
                  (reserva.estado == 'APROBADO' ? 'aprobado' : 'rechazado'))">
            </span>
        </div>

        <div class="acciones">
            <a th:href="@{/reservas}" class="btn btn-volver">
                Volver a mis reservas
            </a>
        </div>

    </div>

</div>

<footer th:replace="~{fragments/fragmentos :: footer}"></footer>

</body>
</html>
